# nginx serves the built SPA and reverse-proxies /api/* to the backend (ADR D5).
# The SPA uses a relative "/api" base URL, so the browser only ever talks to this
# single origin — sidestepping CORS and Vite build-time env baking.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    # Gzip for text assets served from disk *and* for JSON proxied from the
    # backend (gzip_proxied defaults to off, so upstream /api responses would
    # otherwise cross the wire uncompressed — Perf M-4).
    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss;
    gzip_min_length 1024;

    # ── Security headers (Sec M2) ────────────────────────────────────────────
    # helmet() only guards the API JSON; the SPA HTML origin is served here, so
    # its headers must be set on nginx. `always` emits them even on error/3xx.
    # NOTE: nginx does not inherit add_header into a location that declares its
    # own add_header, so the security set is repeated in `location = /index.html`
    # (the SPA document is ultimately served from there via the try_files
    # fallback). Keep the two lists in sync.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    # Local demo is served over http; enable HSTS once behind TLS:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Reverse proxy: /api/<path> → backend /<path> (strip the /api prefix).
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Content-hashed, immutable build assets → cache aggressively (Perf M-3).
    location ~* \.(?:js|css|woff2?|png|svg|jpg|jpeg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html points at the hashed assets and changes every deploy, so it must
    # always be revalidated (Perf M-3). This block re-declares the security
    # headers because a location with its own add_header does not inherit them.
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Frame-Options "DENY" always;
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
