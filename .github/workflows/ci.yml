name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref so rapid pushes don't pile up runners (CICD L-3).
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

# Least-privilege default token; individual jobs opt into more if ever needed (CICD L-3).
permissions:
  contents: read

jobs:
  # ── Lint + typecheck + unit tests + build across both workspaces ─────────────
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: simpleinvoice
          POSTGRES_PASSWORD: simpleinvoice
          POSTGRES_DB: simpleinvoice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U simpleinvoice"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://simpleinvoice:simpleinvoice@localhost:5432/simpleinvoice_test?schema=public
      JWT_SECRET: ci_test_secret_value_1234567890
      JWT_EXPIRES_IN: '3600'
      APP_TIMEZONE: UTC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm ci installs from the committed root lockfile (fails on lockfile drift),
      # unlike npm install which re-resolves the tree (CICD H-3).
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Apply migrations (for e2e)
        run: npm run prisma:migrate --workspace backend

      - name: Backend unit tests
        run: npm run test --workspace backend

      - name: Backend e2e tests
        run: npm run test:e2e --workspace backend

      - name: Frontend tests
        run: npm run test --workspace frontend

      - name: Build both workspaces
        run: npm run build

  # ── Security & supply-chain gates (CICD H-3 / Sec M3) ────────────────────────
  # Separate job so audit/secret-scan results surface independently of the build.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans history; fetch it all so the secret scan is meaningful.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Report known-vulnerable production deps. continue-on-error so known
      # transitive advisories don't block the demo build but stay visible (Sec M3).
      - name: Dependency audit (prod, high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      # Secret scan (committed credentials, tokens, keys).
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Verify the Docker images build, then scan them ──────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t simpleinvoice-backend ./backend
      - name: Build frontend image
        run: docker build -t simpleinvoice-frontend ./frontend

      # Image vulnerability scan. exit-code 0 → reports findings without failing the
      # build (visibility over hard gate for the assessment demo) (CICD H-3 / M-6).
      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: simpleinvoice-backend
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
      - name: Trivy scan (frontend image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: simpleinvoice-frontend
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

  # ── Playwright browser e2e against the full Docker stack (CICD L-1) ──────────
  # Best-effort: global-setup runs `docker compose up -d --build` and the suite drives
  # the SPA through nginx using system Chrome (channel: 'chrome'). Bringing up a full
  # stack + browser in CI is comparatively fragile, so this job is marked
  # continue-on-error to stay informative without blocking the pipeline.
  playwright:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # channel: 'chrome' → install Google Chrome (+ OS deps) for Playwright.
      - name: Install Playwright browser (Chrome)
        run: npx playwright install --with-deps chrome

      # global-setup brings up the compose stack and waits for /api/health.
      - name: Run Playwright e2e
        run: npm run test:e2e:pw

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7
